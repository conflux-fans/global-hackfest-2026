# Minimal Docker Compose - backend + frontend only
# Run: docker-compose -f docker-compose.minimal.yml up -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: realyx-backend
    environment:
      PORT: 3001
      WS_PORT: 3002
      NODE_ENV: production
      POSTGRES_URL: ${POSTGRES_URL:-postgres://realyx:realyx_secret@postgres:5432/realyx}
      CHAIN_ID: ${CHAIN_ID:-71}
      RPC_URL: ${RPC_URL:-https://evmtestnet.confluxrpc.com}
      RPC_FALLBACK_URL: ${RPC_FALLBACK_URL:-https://evmtestnet.confluxrpc.org}
      TRADING_CORE_ADDRESS: ${TRADING_CORE_ADDRESS:-0x64f277f73bfc81Ad80286a4266c0E0613d867Df3}
      VAULT_CORE_ADDRESS: ${VAULT_CORE_ADDRESS:-0xB5C983d038caA21f4a9520b0EFAb2aD71DE4e714}
      ORACLE_AGGREGATOR_ADDRESS: ${ORACLE_AGGREGATOR_ADDRESS:-0x89cC8eAbF2e967d81FD04D1023298A3bDcE67450}
    ports:
      - "3011:3001"
      - "3012:3002"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3010/ws}
        VITE_RPC_URL: ${VITE_RPC_URL:-https://evmtestnet.confluxrpc.com}
        VITE_CONFLUX_TESTNET_RPC_URL: ${VITE_CONFLUX_TESTNET_RPC_URL:-https://evmtestnet.confluxrpc.com}
        VITE_APP_URL: ${VITE_APP_URL:-http://localhost:3010}
        VITE_WALLET_CONNECT_PROJECT_ID: ${VITE_WALLET_CONNECT_PROJECT_ID:-}
        VITE_POSITION_TOKEN_ADDRESS: ${VITE_POSITION_TOKEN_ADDRESS:-0x4368b5741A105c1ACE50ad98581fDa050685fa8B}
        VITE_ORACLE_AGGREGATOR_ADDRESS: ${VITE_ORACLE_AGGREGATOR_ADDRESS:-0x89cC8eAbF2e967d81FD04D1023298A3bDcE67450}
        VITE_VAULT_CORE_ADDRESS: ${VITE_VAULT_CORE_ADDRESS:-0xB5C983d038caA21f4a9520b0EFAb2aD71DE4e714}
        VITE_TRADING_CORE_ADDRESS: ${VITE_TRADING_CORE_ADDRESS:-0x64f277f73bfc81Ad80286a4266c0E0613d867Df3}
        VITE_MOCK_USDC_ADDRESS: ${VITE_MOCK_USDC_ADDRESS:-0xa56Ba38f3c820D6cf31a68CBBD0d25c0F5644d35}
    ports:
      - "3010:80"
    depends_on:
      - backend
    restart: unless-stopped
