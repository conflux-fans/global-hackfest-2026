groups:
  - name: realyx-infrastructure
    rules:
      # Backend Health
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend instance {{ $labels.instance }} is down"
          description: "Backend has been down for more than 1 minute."

      # High Error Rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for the last 5 minutes."

      # High Latency
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "P95 latency is above 500ms."

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Container memory usage is above 85%."

      # Database Connections
      - alert: DatabaseConnectionPoolExhausted
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool near exhaustion"
          description: "PostgreSQL connections at 80% of max."

  - name: realyx-oracle
    rules:
      # OracleAggregator - Price Feed Staleness
      - alert: OraclePriceStale
        expr: time() - oracle_last_update_timestamp > 60
        for: 2m
        labels:
          severity: critical
          contract: OracleAggregator
        annotations:
          summary: "Oracle price feed is stale for {{ $labels.collection }}"
          description: "Price hasn't updated in over 60 seconds."

      # Circuit Breaker Triggered
      - alert: CircuitBreakerTriggered
        expr: oracle_circuit_breaker_active == 1
        for: 0m
        labels:
          severity: critical
          contract: OracleAggregator
        annotations:
          summary: "Circuit breaker triggered for {{ $labels.collection }}"
          description: "Oracle circuit breaker is active. Trading may be paused."

      # Price Deviation
      - alert: OraclePriceDeviation
        expr: abs(oracle_price_change_percent) > 20
        for: 1m
        labels:
          severity: warning
          contract: OracleAggregator
        annotations:
          summary: "Large price deviation for {{ $labels.collection }}"
          description: "Price changed by more than 20% in 1 minute."

  - name: realyx-trading
    rules:
      # TradingCore - Liquidation Queue
      - alert: LiquidationQueueBacklog
        expr: liquidation_queue_size > 100
        for: 2m
        labels:
          severity: critical
          contract: TradingCore
        annotations:
          summary: "Liquidation queue backlog"
          description: "Over 100 pending liquidations."

      # High Open Interest
      - alert: HighOpenInterest
        expr: trading_open_interest_usd > 50000000
        for: 5m
        labels:
          severity: warning
          contract: TradingCore
        annotations:
          summary: "High open interest for {{ $labels.collection }}"
          description: "Open interest exceeds $50M."

      # Funding Rate Extreme
      - alert: FundingRateExtreme
        expr: abs(trading_funding_rate_bps) > 100
        for: 30m
        labels:
          severity: warning
          contract: TradingCore
        annotations:
          summary: "Extreme funding rate for {{ $labels.collection }}"
          description: "Funding rate exceeds ±1% (100 bps)."

  - name: realyx-vault
    rules:
      # VaultCore - Insurance Fund Low
      - alert: InsuranceFundLow
        expr: vault_insurance_fund_balance_usd < 10000
        for: 5m
        labels:
          severity: warning
          contract: VaultCore
        annotations:
          summary: "Insurance fund balance low"
          description: "Insurance fund below $10,000."

      # High Utilization
      - alert: VaultHighUtilization
        expr: vault_utilization_percent > 80
        for: 10m
        labels:
          severity: warning
          contract: VaultCore
        annotations:
          summary: "High vault utilization"
          description: "Vault utilization exceeds 80%."

      # Emergency Mode
      - alert: VaultEmergencyMode
        expr: vault_emergency_mode_active == 1
        for: 0m
        labels:
          severity: critical
          contract: VaultCore
        annotations:
          summary: "Vault emergency mode activated"
          description: "VaultCore is in emergency mode. Withdrawals may be restricted."

  - name: realyx-indexer
    rules:
      # Indexer Lag
      - alert: IndexerLag
        expr: indexer_lag_seconds > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Indexer is lagging"
          description: "Indexer lag exceeds 30 seconds."

      # Indexer Reorg
      - alert: IndexerReorg
        expr: increase(indexer_reorg_count[1h]) > 5
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Multiple chain reorganizations detected"
          description: "More than 5 reorgs in the last hour."
